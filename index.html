<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Reali Resto — Dirt Bike &amp; ATV Repair</title>
  <link rel="icon" type="image/png" href="assets/logo-monogram.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700;800;900&family=Archivo:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       COLOR & TYPE TOKENS
    ============================================================ */
    :root {
      --rr-mud-50:  #FCEFE7; --rr-mud-100: #F8D5BE; --rr-mud-200: #F4A877;
      --rr-mud-300: #F0823F; --rr-mud-400: #EA6411; --rr-mud-500: #D1530C;
      --rr-mud-600: #A8400A; --rr-mud-700: #7A2D07;
      --rr-oil-950: #0E0D0B; --rr-oil-900: #16140F; --rr-oil-800: #1E1B16;
      --rr-oil-700: #28241E; --rr-oil-600: #3A352D;
      --rr-chrome-50: #FBFBFA; --rr-chrome-100: #ECECEA; --rr-chrome-200: #D6D4CF;
      --rr-chrome-300: #B8B4AC; --rr-chrome-400: #97928A; --rr-chrome-500: #6F6A62;
      --rr-steel-500: #6E665C; --rr-steel-400: #8A8278; --rr-steel-300: #A9A096;
      --rr-steel-200: #C9C0B5; --rr-steel-100: #E2DCD2;
      --rr-bone-50: #FAF5EB; --rr-bone-100: #F2EBDD; --rr-bone-200: #E8DEC8; --rr-bone-300: #D9CBAE;
      --rr-caution-300: #FBE17A; --rr-caution-400: #F5C518; --rr-caution-500: #C99A0A;
      --rr-trail-500: #2F4A2A; --rr-trail-400: #4A6B41;
      --rr-rust-500: #8C3A1A;

      --rr-bg:           var(--rr-bone-100);
      --rr-bg-elevated:  var(--rr-bone-50);
      --rr-bg-sunken:    var(--rr-bone-200);
      --rr-surface-card: var(--rr-bone-50);
      --rr-fg-1:    var(--rr-oil-900);
      --rr-fg-2:    var(--rr-oil-700);
      --rr-fg-3:    var(--rr-steel-500);
      --rr-line:    var(--rr-oil-900);
      --rr-line-soft: var(--rr-steel-200);
      --rr-line-strong: var(--rr-steel-300);

      --rr-grad-chrome: linear-gradient(180deg, var(--rr-chrome-50) 0%, var(--rr-chrome-200) 42%, var(--rr-chrome-400) 58%, var(--rr-chrome-100) 100%);
      --rr-grad-orange: linear-gradient(180deg, #F7A24A 0%, var(--rr-mud-400) 52%, var(--rr-mud-600) 100%);

      --rr-font-display: "Big Shoulders Display", "Impact", "Oswald", sans-serif;
      --rr-font-body:    "Archivo", "Helvetica Neue", Arial, sans-serif;
      --rr-font-mono:    "JetBrains Mono", ui-monospace, "SF Mono", monospace;

      --rr-ease-out: cubic-bezier(0.2, 0.7, 0.2, 1);
      --rr-dur: 180ms;
    }

    .rr-dark {
      --rr-bg:           var(--rr-oil-900);
      --rr-bg-elevated:  var(--rr-oil-800);
      --rr-bg-sunken:    var(--rr-oil-950);
      --rr-surface-card: var(--rr-oil-800);
      --rr-fg-1:    var(--rr-chrome-100);
      --rr-fg-2:    var(--rr-chrome-300);
      --rr-fg-3:    var(--rr-chrome-400);
      --rr-line:          var(--rr-oil-700);
      --rr-line-soft:     var(--rr-oil-700);
      --rr-line-strong:   var(--rr-chrome-500);
    }

    /* ============================================================
       WEBSITE STYLES
    ============================================================ */
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--rr-bg); color: var(--rr-fg-1);
      font-family: var(--rr-font-body); font-size: 16px; line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(120% 80% at 50% -10%, rgba(234,100,17,0.06), transparent 60%),
        repeating-linear-gradient(115deg, rgba(255,255,255,0.012) 0 2px, transparent 2px 5px);
      mix-blend-mode: screen;
    }
    #root { position: relative; z-index: 1; }
    img { max-width: 100%; display: block; }
    a { color: inherit; }
    button { font: inherit; cursor: pointer; }

    .page { min-height: 100vh; display: flex; flex-direction: column; }
    .page-body { flex: 1; }
    .section { padding: 96px 56px; position: relative; }
    .section.tight { padding: 56px 56px; }
    .section.elevated { background: var(--rr-bg-elevated); border-block: 2px solid var(--rr-line); }
    .section.deep { background: var(--rr-bg-sunken); }
    .section.mud  { background: var(--rr-grad-orange); color: var(--rr-oil-900); }
    .section.mud .h-display, .section.mud .eyebrow { color: var(--rr-oil-900); }
    .container { max-width: 1280px; margin: 0 auto; }

    .rr-grid { display: grid; gap: 28px; }
    .rr-grid-2  { grid-template-columns: 1fr 1fr; }
    .rr-grid-3  { grid-template-columns: repeat(3, 1fr); }
    .rr-grid-4  { grid-template-columns: repeat(4, 1fr); }
    .rr-grid-hero        { grid-template-columns: 1.15fr 1fr; align-items: center; gap: 56px; }
    .rr-grid-cta-dark    { grid-template-columns: 1.2fr 1fr;  align-items: center; gap: 56px; }
    .rr-grid-contact     { grid-template-columns: 1.2fr 1fr;  gap: 56px; }
    .rr-grid-form        { grid-template-columns: 1fr 1fr;    gap: 20px; }
    .rr-grid-about       { grid-template-columns: 1fr 1fr;    align-items: center; gap: 56px; }
    .rr-grid-about-prose { grid-template-columns: 1fr 1fr;    gap: 56px; }
    .rr-grid-footer      { grid-template-columns: 1.4fr 1fr 1fr 1fr; gap: 40px; }
    .rr-grid-service-row { display: grid; grid-template-columns: 100px 1fr 200px 160px 80px; align-items: center; }

    .eyebrow {
      display: inline-flex; align-items: center; gap: 10px;
      font-family: var(--rr-font-body); font-weight: 700;
      font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--rr-fg-3);
    }
    .eyebrow::before { content: ""; width: 28px; height: 2px; background: var(--rr-mud-400); }

    .chrome { background: var(--rr-grad-chrome); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent; padding-right: 0.08em; margin-right: -0.08em; }
    .orange { background: var(--rr-grad-orange); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent; padding-right: 0.08em; margin-right: -0.08em; }

    .btn {
      display: inline-flex; align-items: center; gap: 10px;
      font-family: var(--rr-font-display); font-weight: 800; font-style: italic;
      font-size: 15px; letter-spacing: 0.06em; text-transform: uppercase; white-space: nowrap;
      padding: 14px 24px; border: 2px solid var(--rr-oil-950); border-radius: 0;
      background: var(--rr-grad-orange); color: var(--rr-oil-900);
      box-shadow: 4px 4px 0 var(--rr-oil-950);
      transition: transform var(--rr-dur) var(--rr-ease-out), box-shadow var(--rr-dur) var(--rr-ease-out);
      text-decoration: none;
    }
    .btn:hover  { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--rr-oil-950); }
    .btn:active { transform: translate(2px, 2px);  box-shadow: 0 0 0 var(--rr-oil-950); }
    .btn-primary { background: var(--rr-grad-orange); color: var(--rr-oil-900); }
    .btn-dark { background: linear-gradient(180deg, var(--rr-chrome-100), var(--rr-chrome-300)); color: var(--rr-oil-900); border-color: var(--rr-oil-950); box-shadow: 4px 4px 0 var(--rr-mud-500); }
    .btn-dark:hover { box-shadow: 6px 6px 0 var(--rr-mud-500); }
    .btn-ghost { background: transparent; color: var(--rr-fg-1); border: 2px solid var(--rr-chrome-500); box-shadow: none; }
    .btn-ghost:hover { box-shadow: none; transform: none; border-color: var(--rr-mud-400); color: var(--rr-mud-300); }
    .btn-sm { padding: 10px 16px; font-size: 12px; }

    .tag {
      display: inline-block; font-family: var(--rr-font-body); font-weight: 700;
      font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
      padding: 6px 12px; border: 2px solid var(--rr-chrome-500); border-radius: 999px;
      background: var(--rr-oil-800); color: var(--rr-chrome-200);
    }
    .tag.active { background: var(--rr-mud-400); color: var(--rr-oil-900); border-color: var(--rr-mud-600); }

    .h-display { font-family: var(--rr-font-display); font-weight: 900; font-style: italic; line-height: 0.9; letter-spacing: -0.01em; text-transform: uppercase; color: var(--rr-fg-1); margin: 0; }
    .h1 { font-size: clamp(56px, 8vw, 120px); }
    .h2 { font-size: clamp(36px, 4.5vw, 64px); line-height: 0.95; }
    .h3 { font-size: clamp(22px, 2vw, 30px); line-height: 1.05; font-style: normal; }

    .photo {
      background: linear-gradient(135deg, var(--rr-oil-950) 0%, var(--rr-oil-700) 55%, var(--rr-mud-700) 100%);
      position: relative; overflow: hidden; border: 2px solid var(--rr-line);
    }
    .photo::after {
      content: attr(data-label); position: absolute; inset: 0; display: grid; place-items: center;
      font-family: var(--rr-font-mono); font-size: 11px; letter-spacing: 0.24em;
      color: var(--rr-chrome-300); opacity: 0.65;
    }
    .photo.alt-1 { background: linear-gradient(135deg, #16140F 0%, #7A2D07 85%); }
    .photo.alt-2 { background: linear-gradient(135deg, #1E1B16 0%, #3A352D 70%, #0E0D0B 100%); }
    .photo.alt-3 { background: linear-gradient(135deg, #28241E 0%, #A8400A 100%); }
    .photo.alt-4 { background: linear-gradient(135deg, #0E0D0B 0%, #6F6A62 120%); }
    .photo.alt-5 { background: linear-gradient(135deg, #7A2D07 0%, #F0823F 100%); }
    .photo.alt-6 { background: linear-gradient(135deg, #16140F 0%, #28241E 60%, #0E0D0B 100%); }

    .field { display: flex; flex-direction: column; gap: 8px; }
    .field label { font-family: var(--rr-font-body); font-weight: 700; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--rr-fg-3); }
    .field input, .field select, .field textarea {
      font-family: var(--rr-font-body); font-size: 15px; padding: 12px 14px;
      background: var(--rr-oil-950); border: 2px solid var(--rr-line-strong);
      color: var(--rr-fg-1); border-radius: 0; outline: none;
      transition: box-shadow var(--rr-dur) var(--rr-ease-out), border-color var(--rr-dur) var(--rr-ease-out);
    }
    .field input::placeholder, .field textarea::placeholder { color: var(--rr-chrome-500); }
    .field input:focus, .field select:focus, .field textarea:focus { box-shadow: 4px 4px 0 var(--rr-mud-500); border-color: var(--rr-mud-400); }

    .rr-card { background: var(--rr-surface-card); border: 2px solid var(--rr-line-strong); box-shadow: 6px 6px 0 var(--rr-oil-950); }
    .rr-card.accent { box-shadow: 6px 6px 0 var(--rr-mud-500); border-color: var(--rr-mud-500); }
    .rr-services-list { overflow: hidden; }

    .checker-strip {
      height: 14px; opacity: 0.9;
      background-color: var(--rr-oil-950);
      background-image:
        linear-gradient(45deg, var(--rr-oil-700) 25%, transparent 25%),
        linear-gradient(-45deg, var(--rr-oil-700) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, var(--rr-oil-700) 75%),
        linear-gradient(-45deg, transparent 75%, var(--rr-oil-700) 75%);
      background-size: 14px 14px;
      background-position: 0 0, 0 7px, 7px -7px, -7px 0px;
    }
    .warn-strip {
      height: 12px;
      background: repeating-linear-gradient(-45deg, var(--rr-mud-500) 0px, var(--rr-mud-500) 6px, var(--rr-oil-950) 6px, var(--rr-oil-950) 12px);
    }

    .rr-nav-wrap { padding: 12px 56px; display: flex; align-items: center; justify-content: space-between; gap: 24px; }
    .rr-nav-links { display: flex; gap: 28px; }
    .rr-nav-link { font-family: var(--rr-font-body); font-weight: 700; font-size: 13px; letter-spacing: 0.14em; text-transform: uppercase; text-decoration: none; padding-bottom: 4px; border-bottom: 2px solid transparent; color: var(--rr-fg-2); white-space: nowrap; transition: color var(--rr-dur); }
    .rr-nav-link:hover { color: var(--rr-fg-1); }
    .rr-nav-link.active { color: var(--rr-mud-400); border-bottom-color: var(--rr-mud-400); }
    .rr-nav-cta { white-space: nowrap; }
    @keyframes rr-fade-in { from { opacity: 0; } to { opacity: 1; } }
    .rr-carousel-img { animation: rr-fade-in 0.18s ease; }
    .rr-carousel-btn { position: absolute; top: 0; bottom: 0; width: 44px; border: none; background: rgba(14,13,11,0.55); color: var(--rr-chrome-100); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 150ms; }
    .rr-carousel-btn:hover { background: rgba(14,13,11,0.82); }

    @media (max-width: 900px) {
      .section { padding: 72px 32px; }
      .section.tight { padding: 48px 32px; }
      .rr-grid-hero, .rr-grid-cta-dark, .rr-grid-contact, .rr-grid-about, .rr-grid-about-prose { grid-template-columns: 1fr; gap: 36px; }
      .rr-grid-3 { grid-template-columns: 1fr 1fr; gap: 20px; }
      .rr-grid-4 { grid-template-columns: 1fr 1fr; gap: 24px; }
      .rr-grid-footer { grid-template-columns: 1fr 1fr; gap: 32px; }
      .rr-grid-service-row { grid-template-columns: 80px 1fr 60px; }
      .rr-grid-service-row .svc-price, .rr-grid-service-row .svc-time { grid-column: 2; padding: 0 24px 16px !important; }
      .rr-grid-service-row .svc-time { padding-top: 0 !important; }
      .rr-nav-wrap { padding: 12px 20px; flex-wrap: wrap; gap: 12px; }
      .rr-nav-links { order: 3; flex-basis: 100%; gap: 18px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
      .rr-nav-links::-webkit-scrollbar { display: none; }
      .rr-nav-cta { padding: 8px 12px !important; font-size: 11px !important; }
      .rr-stat-num { font-size: 56px !important; }
      .rr-hero-photo { aspect-ratio: 4 / 3 !important; }
    }
    @media (max-width: 600px) {
      .section { padding: 56px 20px; }
      .section.tight { padding: 36px 20px; }
      .rr-grid-2, .rr-grid-3, .rr-grid-4, .rr-grid-form, .rr-grid-footer { grid-template-columns: 1fr; gap: 20px; }
      .rr-grid { gap: 20px; }
      .h1 { font-size: clamp(40px, 14vw, 72px) !important; }
      .h2 { font-size: clamp(28px, 9vw, 44px) !important; }
    }
  </style>
</head>

  <script type="text/babel">
    const Icon = ({ name, size = 24, stroke = "currentColor", strokeWidth = 2, ...rest }) => {
      const props = { width: size, height: size, viewBox: "0 0 24 24", fill: "none", stroke, strokeWidth, strokeLinecap: "round", strokeLinejoin: "round", ...rest };
      switch (name) {
        case "wrench":      return <svg {...props}><path d="M14.7 6.3a4 4 0 0 0-5.4 5.4L3 18l3 3 6.3-6.3a4 4 0 0 0 5.4-5.4l-2.5 2.5-2.5-.6-.6-2.5 2.6-2.4z"/></svg>;
        case "spark":       return <svg {...props}><path d="M12 2v6M12 16v6M4 12h6M14 12h6M5.6 5.6l4.2 4.2M14.2 14.2l4.2 4.2M5.6 18.4l4.2-4.2M14.2 9.8l4.2-4.2"/></svg>;
        case "shield":      return <svg {...props}><path d="M12 3l8 3v6c0 5-3.5 8-8 9-4.5-1-8-4-8-9V6z"/></svg>;
        case "phone":       return <svg {...props}><path d="M5 4h4l2 5-2.5 1.5a11 11 0 0 0 5 5L15 13l5 2v4a2 2 0 0 1-2 2A16 16 0 0 1 3 6a2 2 0 0 1 2-2z"/></svg>;
        case "pin":         return <svg {...props}><path d="M12 22s7-7.5 7-13a7 7 0 1 0-14 0c0 5.5 7 13 7 13z"/><circle cx="12" cy="9" r="2.5"/></svg>;
        case "clock":       return <svg {...props}><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>;
        case "arrow-right": return <svg {...props}><path d="M5 12h14M13 6l6 6-6 6"/></svg>;
        case "instagram":   return <svg {...props}><rect x="3" y="3" width="18" height="18" rx="4"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.6" fill={stroke}/></svg>;
        case "facebook":    return <svg {...props}><path d="M14 8h2V5h-2a3 3 0 0 0-3 3v2H9v3h2v8h3v-8h2.5l.5-3H14V9z"/></svg>;
        case "check":       return <svg {...props}><path d="M5 13l4 4L19 7"/></svg>;
        default: return null;
      }
    };
    window.Icon = Icon;
  </script>

    const Wordmark = ({ size = 22 }) => (

              <HoursPanel />
              {(d.contact.phone || d.contact.email) && (
                <div className="rr-card" style={{ padding: 24, boxShadow: "none" }}>
                  <div className="eyebrow">Call / Email</div>
                  {d.contact.phone && <div style={{ marginTop: 14, fontFamily: "var(--rr-font-display)", fontWeight: 800, fontStyle: "italic", fontSize: 26, letterSpacing: "0.03em" }} className="orange">{d.contact.phone}</div>}
                  {d.contact.email && <div style={{ marginTop: 4, fontSize: 14, color: "var(--rr-fg-2)" }}>{d.contact.email}</div>}
                </div>
              )}
              <div style={{ border: "2px solid var(--rr-line-strong)", aspectRatio: "4 / 3", position: "relative", background: "repeating-linear-gradient(45deg, var(--rr-oil-800) 0 10px, var(--rr-oil-950) 10px 20px)", overflow: "hidden" }}>
                <div style={{ position: "absolute", left: "50%", top: "50%", transform: "translate(-50%, -100%)" }}>
                  <Icon name="pin" size={48} stroke="var(--rr-mud-400)" strokeWidth={2.5}/>
                </div>
                <div style={{ position: "absolute", bottom: 12, left: 12, right: 12, fontFamily: "var(--rr-font-mono)", fontSize: 10, letterSpacing: "0.18em", textTransform: "uppercase", color: "var(--rr-fg-3)" }}>MAP PLACEHOLDER · ADD LOCATION</div>
              </div>
            </div>
          </div>
        </Section>
      );
    };

    Object.assign(window, { HomePage, WorkPage, ServicesPage, AboutPage, ContactPage });
  </script>

  <script type="text/babel">
    const { useState: useStateApp, useEffect } = React;

    function App() {
      const [page, setPage] = useStateApp(() => {
        try { return localStorage.getItem("rr_page") || "home"; } catch { return "home"; }
      });
      useEffect(() => {
        try { localStorage.setItem("rr_page", page); } catch {}
        window.scrollTo({ top: 0, behavior: "instant" });
      }, [page]);

      const view =
        page === "work"     ? <WorkPage /> :
        page === "services" ? <ServicesPage onNav={setPage} /> :
        page === "about"    ? <AboutPage /> :
        page === "contact"  ? <ContactPage /> :
        <HomePage onNav={setPage} />;

      return (
        <div className="page">
          <Nav current={page} onNav={setPage} />
          <main className="page-body">{view}</main>
          <Footer onNav={setPage} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
